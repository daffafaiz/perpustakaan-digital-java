<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manajemen Buku')}"></head>
<body>
<div class="app">
    <div th:replace="~{fragments/layout :: sidebar('buku')}"></div>
    <div class="main">
        <div th:replace="~{fragments/layout :: topbar('Manajemen Buku')}"></div>
        <main class="content">

            <div class="page-header">
                <div>
                    <h1>Manajemen Buku</h1>
                    <p>Kelola koleksi buku perpustakaan.</p>
                </div>
                <a th:href="@{/buku/tambah}" class="btn btn-primary">
                    <i class="bi bi-plus-lg me-1"></i> Tambah Buku
                </a>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <form th:action="@{/buku}" method="get" class="mb-3">
                <div class="search-box">
                    <i class="bi bi-search"></i>
                    <input type="text" name="q" class="form-control" th:value="${q}"
                           placeholder="Cari judul, pengarang, atau kategori...">
                </div>
            </form>

            <div class="table-wrap">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead>
                        <tr>
                            <th>Judul</th>
                            <th>Pengarang</th>
                            <th>Kategori</th>
                            <th>Tahun</th>
                            <th class="text-center">Stok</th>
                            <th class="text-center">Status</th>
                            <th class="text-end">Aksi</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="b : ${daftarBuku}">
                            <td>
                                <div class="fw-semibold" th:text="${b.judul}">Judul</div>
                                <small class="text-muted" th:if="${b.isbn}" th:text="'ISBN: ' + ${b.isbn}"></small>
                            </td>
                            <td th:text="${b.pengarang}">Pengarang</td>
                            <td><span class="badge-soft badge-info" th:text="${b.kategori}">Kategori</span></td>
                            <td th:text="${b.tahunTerbit}">-</td>
                            <td class="text-center" th:text="${b.jumlahTersedia} + ' / ' + ${b.jumlahTotal}">0/0</td>
                            <td class="text-center">
                                <span th:if="${b.tersedia}" class="badge-soft badge-success">Tersedia</span>
                                <span th:unless="${b.tersedia}" class="badge-soft badge-danger">Habis</span>
                            </td>
                            <td class="text-end text-nowrap">
                                <a th:href="@{/buku/edit/{id}(id=${b.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/buku/hapus/{id}(id=${b.id})}" method="post" class="d-inline"
                                      data-confirm="Hapus buku ini?">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${daftarBuku.isEmpty()}">
                            <td colspan="7">
                                <div class="empty-state">
                                    <i class="bi bi-journal-x d-block mb-2"></i>
                                    Tidak ada buku ditemukan.
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
