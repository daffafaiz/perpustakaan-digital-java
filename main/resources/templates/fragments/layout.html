<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Perpustakaan Digital · ' + ${title}">Perpustakaan Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- ===================== SIDEBAR ===================== -->
<aside th:fragment="sidebar(active)" class="sidebar">
    <div class="sidebar-brand">
        <span class="logo"><i class="bi bi-book-half"></i></span>
        <span>Perpustakaan</span>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">Menu Utama</div>
        <a th:href="@{/dashboard}" class="nav-link-item" th:classappend="${active == 'dashboard'} ? 'active'">
            <i class="bi bi-grid-1x2"></i><span>Dashboard</span>
        </a>
        <a th:href="@{/buku}" class="nav-link-item" th:classappend="${active == 'buku'} ? 'active'">
            <i class="bi bi-journal-bookmark"></i><span>Manajemen Buku</span>
        </a>
        <a th:href="@{/anggota}" class="nav-link-item" th:classappend="${active == 'anggota'} ? 'active'">
            <i class="bi bi-people"></i><span>Manajemen Anggota</span>
        </a>

        <div class="nav-section">Transaksi</div>
        <a th:href="@{/peminjaman}" class="nav-link-item" th:classappend="${active == 'peminjaman'} ? 'active'">
            <i class="bi bi-arrow-left-right"></i><span>Peminjaman</span>
        </a>
        <a th:href="@{/peminjaman/riwayat}" class="nav-link-item" th:classappend="${active == 'riwayat'} ? 'active'">
            <i class="bi bi-clock-history"></i><span>Riwayat Peminjaman</span>
        </a>
        <a th:href="@{/statistik}" class="nav-link-item" th:classappend="${active == 'statistik'} ? 'active'">
            <i class="bi bi-bar-chart"></i><span>Statistik</span>
        </a>
    </nav>
</aside>

<!-- ===================== TOPBAR ===================== -->
<header th:fragment="topbar(title)" class="topbar">
    <div class="d-flex align-items-center gap-2">
        <button class="icon-btn d-lg-none" id="sidebarToggle" type="button" aria-label="Menu">
            <i class="bi bi-list"></i>
        </button>
        <span class="topbar-title" th:text="${title}">Halaman</span>
    </div>
    <div class="topbar-actions">
        <button class="icon-btn" id="themeToggle" type="button" title="Ganti tema">
            <i id="themeIcon" class="bi bi-moon-stars"></i>
        </button>
        <div class="dropdown">
            <div class="user-chip dropdown-toggle" data-bs-toggle="dropdown" role="button" style="cursor:pointer">
                <span class="avatar"><i class="bi bi-person"></i></span>
                <span sec:authentication="name">admin</span>
            </div>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><span class="dropdown-item-text small text-muted">Masuk sebagai
                    <strong sec:authentication="name">admin</strong></span></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/logout}" method="post" class="px-1">
                        <button class="dropdown-item text-danger" type="submit">
                            <i class="bi bi-box-arrow-right me-2"></i>Keluar
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</header>

<!-- ===================== FLASH ALERTS ===================== -->
<div th:fragment="alerts">
    <div th:if="${sukses}" class="alert alert-success alert-auto d-flex align-items-center" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${sukses}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-auto d-flex align-items-center" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
    </div>
</div>

<!-- ===================== SCRIPTS ===================== -->
<th:block th:fragment="scripts">
    <div class="sidebar-overlay"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</th:block>

</body>
</html>
