<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manajemen Anggota')}"></head>
<body>
<div class="app">
    <div th:replace="~{fragments/layout :: sidebar('anggota')}"></div>
    <div class="main">
        <div th:replace="~{fragments/layout :: topbar('Manajemen Anggota')}"></div>
        <main class="content">

            <div class="page-header">
                <div>
                    <h1>Manajemen Anggota</h1>
                    <p>Kelola data anggota perpustakaan.</p>
                </div>
                <a th:href="@{/anggota/tambah}" class="btn btn-primary">
                    <i class="bi bi-person-plus me-1"></i> Tambah Anggota
                </a>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <form th:action="@{/anggota}" method="get" class="mb-3">
                <div class="search-box">
                    <i class="bi bi-search"></i>
                    <input type="text" name="q" class="form-control" th:value="${q}"
                           placeholder="Cari nama, email, atau kode anggota...">
                </div>
            </form>

            <div class="table-wrap">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead>
                        <tr>
                            <th>Kode</th>
                            <th>Nama</th>
                            <th>Email</th>
                            <th>Telepon</th>
                            <th>Terdaftar</th>
                            <th class="text-end">Aksi</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="a : ${daftarAnggota}">
                            <td><span class="badge-soft badge-info" th:text="${a.kodeAnggota}">AGT</span></td>
                            <td class="fw-semibold" th:text="${a.nama}">Nama</td>
                            <td th:text="${a.email}">email</td>
                            <td th:text="${a.telepon}">telepon</td>
                            <td th:text="${a.tanggalDaftar != null ? #temporals.format(a.tanggalDaftar, 'dd MMM yyyy') : '-'}">-</td>
                            <td class="text-end text-nowrap">
                                <a th:href="@{/anggota/edit/{id}(id=${a.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/anggota/hapus/{id}(id=${a.id})}" method="post" class="d-inline"
                                      data-confirm="Hapus anggota ini?">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${daftarAnggota.isEmpty()}">
                            <td colspan="6">
                                <div class="empty-state">
                                    <i class="bi bi-person-x d-block mb-2"></i>
                                    Tidak ada anggota ditemukan.
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
