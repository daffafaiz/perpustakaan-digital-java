<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Peminjaman')}"></head>
<body>
<div class="app">
    <div th:replace="~{fragments/layout :: sidebar('peminjaman')}"></div>
    <div class="main">
        <div th:replace="~{fragments/layout :: topbar('Peminjaman Buku')}"></div>
        <main class="content">

            <div class="page-header">
                <div>
                    <h1>Peminjaman Aktif</h1>
                    <p>Daftar buku yang sedang dipinjam.</p>
                </div>
                <a th:href="@{/peminjaman/baru}" class="btn btn-primary">
                    <i class="bi bi-plus-lg me-1"></i> Peminjaman Baru
                </a>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="table-wrap">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead>
                        <tr>
                            <th>Buku</th>
                            <th>Anggota</th>
                            <th>Tgl Pinjam</th>
                            <th>Jatuh Tempo</th>
                            <th class="text-center">Status</th>
                            <th class="text-end">Aksi</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="p : ${daftarPeminjaman}">
                            <td class="fw-semibold" th:text="${p.buku.judul}">Judul</td>
                            <td th:text="${p.anggota.nama}">Nama</td>
                            <td th:text="${#temporals.format(p.tanggalPinjam, 'dd MMM yyyy')}">-</td>
                            <td th:text="${#temporals.format(p.tanggalJatuhTempo, 'dd MMM yyyy')}">-</td>
                            <td class="text-center">
                                <span th:if="${p.terlambat}" class="badge-soft badge-danger"
                                      th:text="'Terlambat ' + ${p.hariKeterlambatan(null)} + ' hari'">Terlambat</span>
                                <span th:unless="${p.terlambat}" class="badge-soft badge-warning">Dipinjam</span>
                            </td>
                            <td class="text-end">
                                <form th:action="@{/peminjaman/kembalikan/{id}(id=${p.id})}" method="post"
                                      class="d-inline" data-confirm="Proses pengembalian buku ini?">
                                    <button type="submit" class="btn btn-sm btn-primary">
                                        <i class="bi bi-box-arrow-in-down me-1"></i> Kembalikan
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${daftarPeminjaman.isEmpty()}">
                            <td colspan="6">
                                <div class="empty-state">
                                    <i class="bi bi-inbox d-block mb-2"></i>
                                    Tidak ada peminjaman aktif.
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
