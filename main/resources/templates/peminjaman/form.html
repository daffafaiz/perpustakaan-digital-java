<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Peminjaman Baru')}"></head>
<body>
<div class="app">
    <div th:replace="~{fragments/layout :: sidebar('peminjaman')}"></div>
    <div class="main">
        <div th:replace="~{fragments/layout :: topbar('Peminjaman Baru')}"></div>
        <main class="content">

            <div class="page-header">
                <div>
                    <h1>Peminjaman Baru</h1>
                    <p>Catat transaksi peminjaman buku oleh anggota.</p>
                </div>
                <a th:href="@{/peminjaman}" class="btn btn-outline-primary">
                    <i class="bi bi-arrow-left me-1"></i> Kembali
                </a>
            </div>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card-soft p-4" style="max-width: 640px;">
                <form th:action="@{/peminjaman/pinjam}" method="post">
                    <div class="mb-3">
                        <label class="form-label" for="bukuId">Pilih Buku *</label>
                        <select id="bukuId" name="bukuId" class="form-select" required>
                            <option value="" disabled selected>-- Pilih buku tersedia --</option>
                            <option th:each="b : ${daftarBuku}" th:value="${b.id}"
                                    th:text="${b.judul} + ' (tersedia: ' + ${b.jumlahTersedia} + ')'"></option>
                        </select>
                        <small class="text-muted" th:if="${daftarBuku.isEmpty()}">
                            Tidak ada buku yang tersedia untuk dipinjam.
                        </small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="anggotaId">Pilih Anggota *</label>
                        <select id="anggotaId" name="anggotaId" class="form-select" required>
                            <option value="" disabled selected>-- Pilih anggota --</option>
                            <option th:each="a : ${daftarAnggota}" th:value="${a.id}"
                                    th:text="${a.nama} + ' (' + ${a.kodeAnggota} + ')'"></option>
                        </select>
                    </div>
                    <div class="alert alert-info d-flex align-items-center" role="alert">
                        <i class="bi bi-info-circle me-2"></i>
                        Lama peminjaman 7 hari. Denda keterlambatan Rp 1.000 / hari.
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary" th:disabled="${daftarBuku.isEmpty()}">
                            <i class="bi bi-check-lg me-1"></i> Proses Peminjaman
                        </button>
                        <a th:href="@{/peminjaman}" class="btn btn-outline-secondary">Batal</a>
                    </div>
                </form>
            </div>

        </main>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
