# =========================================================
#  Profile PROD - Database PostgreSQL (Railway)
# =========================================================
# Datasource diambil dari environment variable yang di-set di Railway:
#   SPRING_DATASOURCE_URL       = jdbc:postgresql://HOST:PORT/DBNAME
#   SPRING_DATASOURCE_USERNAME  = user
#   SPRING_DATASOURCE_PASSWORD  = password
#
# Spring Boot otomatis membaca SPRING_DATASOURCE_* sehingga blok di bawah
# hanya menyediakan nilai default agar aplikasi tetap aman bila variabel kosong.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/perpustakaan}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.thymeleaf.cache=true
