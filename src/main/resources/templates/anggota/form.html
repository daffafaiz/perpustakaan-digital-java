<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Form Anggota')}"></head>
<body>
<div class="app">
    <div th:replace="~{fragments/layout :: sidebar('anggota')}"></div>
    <div class="main">
        <div th:replace="~{fragments/layout :: topbar('Form Anggota')}"></div>
        <main class="content">

            <div class="page-header">
                <div>
                    <h1 th:text="${mode == 'edit'} ? 'Edit Anggota' : 'Tambah Anggota'">Tambah Anggota</h1>
                    <p>Lengkapi data anggota di bawah ini.</p>
                </div>
                <a th:href="@{/anggota}" class="btn btn-outline-primary">
                    <i class="bi bi-arrow-left me-1"></i> Kembali
                </a>
            </div>

            <div class="card-soft p-4" style="max-width: 760px;">
                <form th:action="${mode == 'edit'} ? @{/anggota/update/{id}(id=${anggota.id})} : @{/anggota/simpan}"
                      th:object="${anggota}" method="post" novalidate>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="nama">Nama Lengkap *</label>
                            <input type="text" id="nama" class="form-control" th:field="*{nama}"
                                   th:classappend="${#fields.hasErrors('nama')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('nama')}" th:errors="*{nama}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="email">Email</label>
                            <input type="email" id="email" class="form-control" th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="telepon">Nomor Telepon</label>
                            <input type="text" id="telepon" class="form-control" th:field="*{telepon}"
                                   th:classappend="${#fields.hasErrors('telepon')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('telepon')}" th:errors="*{telepon}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="alamat">Alamat</label>
                            <textarea id="alamat" class="form-control" rows="2" th:field="*{alamat}"></textarea>
                        </div>
                    </div>

                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i> Simpan
                        </button>
                        <a th:href="@{/anggota}" class="btn btn-outline-secondary">Batal</a>
                    </div>
                </form>
            </div>

        </main>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
