<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo"><i class="bi bi-book-half"></i></div>
        <h1 class="h4 text-center mb-1 fw-bold">Perpustakaan Digital</h1>
        <p class="text-center text-muted mb-4">Silakan masuk untuk melanjutkan</p>

        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> Username atau password salah.
        </div>
        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> Anda telah berhasil keluar.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="admin" autofocus required>
            </div>
            <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="bi bi-box-arrow-in-right me-1"></i> Masuk
            </button>
        </form>

        <div class="text-center mt-4 small text-muted">
            <i class="bi bi-info-circle me-1"></i>
            Akun demo: <strong>admin</strong> / <strong>admin123</strong>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
