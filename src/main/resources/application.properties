# =========================================================
#  Konfigurasi Umum - Sistem Perpustakaan Digital
# =========================================================
spring.application.name=Perpustakaan Digital

# Profile aktif: "dev" (SQLite) secara default, "prod" (PostgreSQL) untuk Railway.
# Railway cukup set environment variable: SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server
server.port=${PORT:8080}
server.error.whitelabel.enabled=false

# Thymeleaf
spring.thymeleaf.cache=false

# JPA / Hibernate umum
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Ukuran upload (jaga-jaga bila menambah fitur)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.mvc.pathmatch.matching-strategy=ant_path_matcher
